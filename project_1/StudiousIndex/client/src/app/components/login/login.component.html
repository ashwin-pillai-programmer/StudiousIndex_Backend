<div class="login-container">
  <div class="login-card fade-in-up">
    <div class="card-header-custom">
      <div class="header-icon">
        <i class="bi bi-mortarboard-fill"></i>
      </div>
      <h3>StudiousIndex</h3>
      <p>Welcome back! Please login to your account.</p>
    </div>
    
    <div class="card-body-custom">
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center mb-4 fade-in" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <div>{{ error }}</div>
      </div>

      <form (ngSubmit)="loginForm.form.valid && login()" #loginForm="ngForm" novalidate>
        <!-- Email Field -->
        <div class="mb-4">
          <label class="form-label" for="email">Email Address <span class="required-star">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input 
              type="email" 
              class="form-control" 
              id="email" 
              [(ngModel)]="email" 
              name="email" 
              required 
              email
              #emailInput="ngModel"
              [class.is-invalid]="emailInput.invalid && (emailInput.dirty || emailInput.touched)"
              placeholder="Enter your email address">
          </div>
          <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="text-danger-custom fade-in">
            <div *ngIf="emailInput.errors?.['required']"><i class="bi bi-exclamation-circle me-1"></i>Email is required.</div>
            <div *ngIf="emailInput.errors?.['email']"><i class="bi bi-exclamation-circle me-1"></i>Please enter a valid email address.</div>
          </div>
        </div>

        <!-- Password Field -->
        <div class="mb-4">
          <label class="form-label" for="password">Password <span class="required-star">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              [(ngModel)]="password" 
              name="password" 
              required 
              minlength="6"
              #passwordInput="ngModel"
              [class.is-invalid]="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)"
              placeholder="Enter your password">
          </div>
          <div *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)" class="text-danger-custom fade-in">
            <div *ngIf="passwordInput.errors?.['required']"><i class="bi bi-exclamation-circle me-1"></i>Password is required.</div>
            <div *ngIf="passwordInput.errors?.['minlength']"><i class="bi bi-exclamation-circle me-1"></i>Password must be at least 6 characters long.</div>
          </div>
          <div class="text-end mt-2">
            <a routerLink="/forgot-password" class="forgot-password-link">Forgot Password?</a>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="d-grid gap-2 mb-4">
          <button type="submit" class="btn btn-primary-custom text-white" [disabled]="loginForm.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            <span *ngIf="!isLoading">Login</span>
            <span *ngIf="isLoading">Logging in...</span>
          </button>
        </div>

        <!-- Register Link -->
        <div class="text-center">
          <p class="mb-0 text-muted">Don't have an account? <a routerLink="/register" class="register-link">Register here</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
