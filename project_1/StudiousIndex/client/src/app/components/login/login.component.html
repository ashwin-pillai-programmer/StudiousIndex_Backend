<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="col-md-5">
    <div class="card shadow-lg">
      <div class="card-header text-center bg-primary text-white">
        <h3><i class="bi bi-person-circle me-2"></i>Login</h3>
      </div>
      <div class="card-body p-4">
        <div *ngIf="error" class="alert alert-danger d-flex align-items-center">
          <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        <form (ngSubmit)="login()">
          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="name@example.com">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="********">
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg">Login</button>
          </div>
          <div class="text-center mt-3">
            <p class="mb-0">Don't have an account? <a routerLink="/register" class="text-decoration-none">Register here</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
