<div class="container mt-4">
    <h2>User Management</h2>

    <div *ngIf="loading" class="text-center mt-4">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div *ngIf="!loading" class="table-responsive mt-3">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                    <td>{{ user.fullName }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        <span class="badge" 
                            [ngClass]="{
                                'bg-danger': user.role === 'Admin',
                                'bg-primary': user.role === 'Teacher',
                                'bg-info': user.role === 'Student'
                            }">
                            {{ user.role }}
                        </span>
                    </td>
                    <td>
                        <span class="badge" [ngClass]="user.isActive ? 'bg-success' : 'bg-secondary'">
                            {{ user.isActive ? 'Active' : 'Disabled' }}
                        </span>
                    </td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                Set Role
                            </button>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" (click)="changeRole(user, 'Admin')">Admin</a></li>
                                <li><a class="dropdown-item" (click)="changeRole(user, 'Teacher')">Teacher</a></li>
                                <li><a class="dropdown-item" (click)="changeRole(user, 'Student')">Student</a></li>
                            </ul>
                        </div>
                        <button class="btn btn-sm ms-2" 
                            [ngClass]="user.isActive ? 'btn-outline-danger' : 'btn-outline-success'"
                            (click)="toggleStatus(user)">
                            {{ user.isActive ? 'Disable' : 'Enable' }}
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
