<div class="container mt-4">
    <h2>Exam Management</h2>

    <div *ngIf="loading" class="text-center mt-4">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div *ngIf="!loading" class="table-responsive mt-3">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Title</th>
                    <th>Created By</th>
                    <th>Questions</th>
                    <th>Duration (min)</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let exam of exams">
                    <td>{{ exam.title }}</td>
                    <td>{{ exam.createdBy }}</td>
                    <td>{{ exam.questionCount }}</td>
                    <td>{{ exam.durationMinutes }}</td>
                    <td>
                        <span class="badge" [ngClass]="exam.isApproved ? 'bg-success' : 'bg-warning text-dark'">
                            {{ exam.isApproved ? 'Approved' : 'Pending' }}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm me-2" 
                            [ngClass]="exam.isApproved ? 'btn-outline-secondary' : 'btn-success'"
                            (click)="exam.isApproved ? rejectExam(exam) : approveExam(exam)">
                            {{ exam.isApproved ? 'Unapprove' : 'Approve' }}
                        </button>
                        <button class="btn btn-sm btn-outline-danger" (click)="deleteExam(exam)">
                            Delete
                        </button>
                    </td>
                </tr>
                <tr *ngIf="exams.length === 0">
                    <td colspan="6" class="text-center">No exams found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
