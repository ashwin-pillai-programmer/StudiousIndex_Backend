<div class="container-fluid dashboard-container">
  <!-- Page Header -->
  <div class="dashboard-header mb-4">
    <h2 class="mb-0">
      <i class="bi bi-speedometer2 me-2"></i>
      Admin Dashboard
    </h2>
    <p class="text-muted mb-0 mt-1">Welcome back! Here's an overview of your education platform.</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3 text-secondary">Loading dashboard statistics...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="alert alert-danger d-flex align-items-center" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <div class="flex-grow-1">{{ error }}</div>
    <button class="btn btn-sm btn-outline-danger ms-3" (click)="loadDashboardStats()">
      <i class="bi bi-arrow-clockwise me-1"></i>Retry
    </button>
  </div>

  <!-- Statistics Cards -->
  <div *ngIf="stats && !loading && !error" class="dashboard-stats-grid">
    <div *ngFor="let card of getStatCards()" 
         class="dashboard-stat-card dashboard-stat-card--{{ card.colorClass }}">
      <div class="dashboard-stat-card__content">
        <div class="dashboard-stat-card__header">
          <div class="dashboard-stat-card__icon">
            <i class="bi {{ card.icon }}"></i>
          </div>
          <h6 class="dashboard-stat-card__title">{{ card.title }}</h6>
        </div>
        <div class="dashboard-stat-card__body">
          <div class="dashboard-stat-card__value">{{ card.value }}</div>
          <p class="dashboard-stat-card__subtitle">{{ card.subtitle }}</p>
        </div>
        <div class="dashboard-stat-card__footer" *ngIf="card.link">
          <a [routerLink]="card.link" class="dashboard-stat-card__link">
            {{ card.linkText }}
            <i class="bi bi-arrow-right ms-1"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div *ngIf="stats && !loading && !error" class="dashboard-quick-actions mt-5">
    <h4 class="mb-3">
      <i class="bi bi-lightning-charge-fill me-2"></i>
      Quick Actions
    </h4>
    <div class="quick-actions-grid">
      <a *ngFor="let action of getQuickActions()" 
         [routerLink]="action.route" 
         class="quick-action-btn quick-action-btn--{{ action.colorClass }}">
        <i class="bi {{ action.icon }} me-2"></i>
        {{ action.label }}
      </a>
    </div>
  </div>
</div>
