<div class="container mt-4 si-dashboard">
  <div class="si-page-header">
    <h2 class="mb-0"><i class="bi bi-mortarboard-fill me-2"></i>Student Dashboard</h2>
    <a routerLink="/exams/history" class="btn btn-outline-primary si-btn-outline">
      <i class="bi bi-clock-history me-1"></i>My Exam History
    </a>
  </div>

  <div *ngIf="loading" class="text-center mt-5 py-5">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
    <p class="mt-3 text-secondary">Loading exams...</p>
  </div>

  <div *ngIf="!loading && exams.length === 0" class="si-empty-state text-center mt-5 py-5">
    <div class="si-empty-icon"><i class="bi bi-journal-x"></i></div>
    <h3 class="mt-3">No exams available currently.</h3>
    <p class="text-secondary">Please check back later.</p>
  </div>

  <div class="row g-4" *ngIf="!loading && exams.length > 0">
    <div class="col-md-4" *ngFor="let exam of exams">
      <div class="card h-100 shadow-sm border-0 si-exam-card">
        <div class="card-header border-0 pt-3 pb-2">
          <h5 class="card-title mb-0">{{ exam.title }}</h5>
        </div>
        <div class="card-body">
          <p class="card-text text-muted small">{{ exam.description }}</p>
          <div class="d-flex justify-content-between mt-3 flex-wrap gap-2">
            <span class="badge si-badge"><i class="bi bi-clock me-1"></i>{{ exam.durationMinutes }} mins</span>
            <span class="badge si-badge"><i class="bi bi-question-circle me-1"></i>{{ exam.questionCount }} Qs</span>
          </div>
          <div class="mt-3 small text-muted">
            <i class="bi bi-person-circle me-1"></i>Instructor: {{ exam.createdBy }}
          </div>
        </div>
        <div class="card-footer bg-transparent border-top-0 pb-3">
          <button class="btn btn-primary w-100" [routerLink]="['/exams', exam.id]">
            <i class="bi bi-pencil-square me-1"></i>View Details & Start
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
