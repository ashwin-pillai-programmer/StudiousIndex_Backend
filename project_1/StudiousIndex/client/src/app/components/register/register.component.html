<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="col-md-6">
    <div class="card shadow-lg">
      <div class="card-header text-center bg-success text-white">
        <h3><i class="bi bi-person-plus-fill me-2"></i>Register</h3>
      </div>
      <div class="card-body p-4">
        <div *ngIf="error" class="alert alert-danger d-flex align-items-center">
          <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        <form (ngSubmit)="register()">
          <div class="mb-3">
            <label class="form-label fw-bold">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" [(ngModel)]="fullName" name="fullName" required placeholder="John Doe">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="name@example.com">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="********">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Role</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
              <select class="form-select" [(ngModel)]="role" name="role">
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-lg">Register</button>
          </div>
          <div class="text-center mt-3">
            <p class="mb-0">Already have an account? <a routerLink="/login" class="text-decoration-none">Login here</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
