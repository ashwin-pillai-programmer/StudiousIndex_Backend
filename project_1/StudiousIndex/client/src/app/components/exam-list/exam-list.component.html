<div class="container mt-4 si-exam-list">
  <div class="si-page-header">
    <h2 class="mb-0"><i class="bi bi-journal-text me-2"></i>Available Exams</h2>
    <div class="d-flex align-items-center flex-wrap gap-2">
      <span class="badge si-role-badge">Role: {{ role }}</span>
      <button class="btn btn-outline-danger btn-sm" (click)="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
      <button *ngIf="role === 'Admin' || role === 'Teacher'" class="btn btn-success" routerLink="/exams/create">
        <i class="bi bi-plus-circle me-1"></i>Create Exam
      </button>
    </div>
  </div>

  <div class="row g-4" *ngIf="exams.length > 0; else noExams">
    <div class="col-md-4" *ngFor="let exam of exams">
      <div class="card h-100 shadow-sm si-exam-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <h5 class="card-title mb-0">{{ exam.title }}</h5>
            <span *ngIf="!exam.isApproved" class="badge bg-warning text-dark shrink-0">Pending</span>
          </div>
          <p class="card-text text-muted small mt-2">{{ exam.description }}</p>
          <div class="d-flex justify-content-between mt-3 flex-wrap gap-2">
            <span class="badge si-badge"><i class="bi bi-clock me-1"></i>{{ exam.durationMinutes }} mins</span>
            <span class="badge si-badge"><i class="bi bi-question-circle me-1"></i>{{ exam.questionCount }} Qs</span>
          </div>
          <p class="card-text mt-2 mb-0"><small class="text-muted">By: {{ exam.createdBy }}</small></p>
        </div>
        <div class="card-footer bg-transparent border-top-0 pb-3">
          <button *ngIf="role === 'Student'" class="btn btn-primary w-100" [routerLink]="['/exams', exam.id]">
            <i class="bi bi-pencil-square me-1"></i>Attempt Exam
          </button>
          <div *ngIf="role !== 'Student'" class="d-grid gap-2">
            <button class="btn btn-info text-white" [routerLink]="['/exams', exam.id, 'results']">
              <i class="bi bi-bar-chart-line me-1"></i>View Results
            </button>
            <button *ngIf="role === 'Admin' && !exam.isApproved" class="btn btn-warning" (click)="approveExam(exam.id)">
              <i class="bi bi-check-circle me-1"></i>Approve
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noExams>
    <div class="si-empty-state text-center mt-5 py-5">
      <div class="si-empty-icon"><i class="bi bi-clipboard-x"></i></div>
      <h3 class="mt-3">No exams available currently.</h3>
      <p *ngIf="role === 'Admin' || role === 'Teacher'" class="text-secondary">Click "Create Exam" to get started!</p>
    </div>
  </ng-template>
</div>
