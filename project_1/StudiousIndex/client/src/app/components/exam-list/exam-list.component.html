<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded shadow-sm">
    <h2 class="mb-0 text-primary"><i class="bi bi-journal-text me-2"></i>Available Exams</h2>
    <div class="d-flex align-items-center">
        <span class="me-3 badge bg-secondary fs-6">Role: {{ role }}</span>
        <button class="btn btn-outline-danger me-2" (click)="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
        <button *ngIf="role === 'Admin' || role === 'Teacher'" class="btn btn-success" routerLink="/exams/create">
            <i class="bi bi-plus-circle me-1"></i>Create Exam
        </button>
    </div>
  </div>
  
  <div class="row" *ngIf="exams.length > 0; else noExams">
    <div class="col-md-4 mb-4" *ngFor="let exam of exams">
      <div class="card h-100 shadow-sm hover-effect">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="card-title text-primary">{{ exam.title }}</h5>
            <span *ngIf="!exam.isApproved" class="badge bg-warning text-dark">Pending</span>
          </div>
          <p class="card-text text-muted">{{ exam.description }}</p>
          <div class="d-flex justify-content-between mt-3">
              <span class="badge bg-light text-dark border"><i class="bi bi-clock me-1"></i>{{ exam.durationMinutes }} mins</span>
              <span class="badge bg-light text-dark border"><i class="bi bi-question-circle me-1"></i>{{ exam.questionCount }} Qs</span>
          </div>
          <p class="card-text mt-2"><small class="text-muted">By: {{ exam.createdBy }}</small></p>
        </div>
        <div class="card-footer bg-transparent border-top-0 pb-3">
          <button *ngIf="role === 'Student'" class="btn btn-primary w-100" [routerLink]="['/exams', exam.id]">
            <i class="bi bi-pencil-square me-1"></i>Attempt Exam
          </button>
          <div *ngIf="role !== 'Student'" class="d-grid gap-2">
            <button class="btn btn-info text-white" [routerLink]="['/exams', exam.id, 'results']">
              <i class="bi bi-bar-chart-line me-1"></i>View Results
            </button>
            <button *ngIf="role === 'Admin' && !exam.isApproved" class="btn btn-warning" (click)="approveExam(exam.id)">
              <i class="bi bi-check-circle me-1"></i>Approve
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noExams>
      <div class="text-center mt-5">
          <div class="display-1 text-muted"><i class="bi bi-clipboard-x"></i></div>
          <h3 class="text-muted mt-3">No exams available currently.</h3>
          <p *ngIf="role === 'Admin' || role === 'Teacher'" class="text-muted">Click "Create Exam" to get started!</p>
      </div>
  </ng-template>
</div>
