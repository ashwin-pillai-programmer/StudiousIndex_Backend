<div class="forgot-container">
  <div class="forgot-card fade-in-up">
    <div class="card-header-custom">
      <div class="header-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h3>StudiousIndex</h3>
      <p>Reset your password in 3 simple steps</p>
    </div>
    
    <div class="card-body-custom">
      <!-- Error Alert -->
      <div *ngIf="error" class="alert alert-danger fade-in">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
      </div>

      <!-- Success Alert -->
      <div *ngIf="success" class="alert alert-success fade-in">
        <i class="bi bi-check-circle-fill me-2"></i> {{ success }}
      </div>

      <!-- Step 1: Mobile Number -->
      <form *ngIf="step === 1" (ngSubmit)="sendOtp()">
        <div class="mb-4">
          <label class="form-label">Enter Mobile Number <span class="required-star">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-phone"></i></span>
            <input type="tel" class="form-control" [(ngModel)]="mobile" name="mobile" required placeholder="+91 XXXXX XXXXX" pattern="[0-9]{10}">
          </div>
          <small class="text-muted mt-2 d-block">We will send a 6-digit OTP to this number.</small>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary-custom" [disabled]="!mobile || mobile.length < 10">Send OTP</button>
        </div>
      </form>

      <!-- Step 2: OTP Verification -->
      <form *ngIf="step === 2" (ngSubmit)="verifyOtp()">
        <div class="mb-4 text-center">
          <label class="form-label">Enter OTP sent to {{ mobile }} <span class="required-star">*</span></label>
          <div class="otp-inputs d-flex justify-content-center gap-2 mt-2">
            <input type="text" class="form-control text-center otp-box" maxlength="6" [(ngModel)]="otp" name="otp" required placeholder="123456">
          </div>
          <!-- Dev Mode OTP Display -->
          <div *ngIf="devOtp" class="alert alert-warning mt-3 py-2 fade-in">
             <small><strong>OTP shown only for development/testing:</strong> {{ devOtp }}</small>
          </div>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary-custom" [disabled]="!otp || otp.length < 4">Verify OTP</button>
          <button type="button" class="btn btn-outline-secondary" (click)="step = 1">Change Mobile Number</button>
        </div>
      </form>

      <!-- Step 3: New Password -->
      <form *ngIf="step === 3" (ngSubmit)="resetPassword()">
        <div class="mb-3">
          <label class="form-label">New Password <span class="required-star">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" [(ngModel)]="newPassword" name="newPassword" required minlength="6" placeholder="Enter new password">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password <span class="required-star">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="Confirm new password">
          </div>
          <small *ngIf="newPassword && confirmPassword && newPassword !== confirmPassword" class="text-danger-custom">Passwords do not match</small>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-success-custom" [disabled]="!newPassword || !confirmPassword || newPassword !== confirmPassword">Reset Password</button>
        </div>
      </form>

      <!-- Back to Login -->
      <div class="text-center mt-4">
        <a routerLink="/login" class="back-link"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
      </div>
    </div>
  </div>
</div>
